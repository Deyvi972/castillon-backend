# ============================================================
#  CASTILLONV2 — application.properties para Render + FreeSQLDatabase
#  Las variables de entorno se configuran en Render Dashboard
# ============================================================

# Base de datos MySQL (variables de entorno de Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Puerto (Render asigna PORT automáticamente)
server.port=${PORT:8080}
